name: AI Commit Summary

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  summarize:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run AI Summary
        uses: shiva1631/ai-commit-summary-action@test4
        with:
          github_token: ${{ secrets.SGITHUB_TOKEN }}
